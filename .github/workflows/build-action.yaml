name: Deploy to Pages

# Org policy allows only github-owned actions + a small allowlist, all SHA
# pinned (see ../CLAUDE.md). shalzz/zola-deploy-action is not allowed, so this
# builds with the Zola release binary and publishes through the official Pages
# actions (source: GitHub Actions, not a gh-pages branch).
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  ZOLA_VERSION: "0.22.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Zola
        run: |
          set -euo pipefail
          url="https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSfL --retry 3 "$url" | tar xz
          install -m755 zola /usr/local/bin/zola
          zola --version

      - name: Build
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
